<app-second-navbar
  [backPath]="backPath"
  [title]="title"
  [items]="navItems"
  (buttonClicked)="onNavbarButtonClick($event)"
></app-second-navbar>

<div class="set-up-scanner-content">
  <div class="cards-container">
    @for (cardType of regularCardTypes; track cardType) {
      <app-configuration-card [cardType]="cardType"></app-configuration-card>
    }
  </div>

  @if (filterCardType !== undefined) {
    <div class="filter-card-container">
      <app-configuration-card [cardType]="filterCardType"></app-configuration-card>
    </div>
  }
</div>
