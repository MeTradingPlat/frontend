<div class="login-container">
  <!-- Forzar reactividad en modo Zoneless vinculando a la señal de idioma -->
  <span [hidden]="true">{{ i18nService.currentLocale() }}</span>
  
  <div class="login-card">
    <h2>{{ 'AUTH.WELCOME' | translate }}</h2>
    <p class="subtitle">{{ 'AUTH.SUBTITLE' | translate }}</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">{{ 'AUTH.USERNAME' | translate }}</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          [placeholder]="'AUTH.USERNAME_PLACEHOLDER' | translate"
          [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
      </div>

      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        {{ errorMessage() | translate }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-primary">
        <span *ngIf="isLoading()" class="spinner"></span>
        <span *ngIf="!isLoading()">{{ 'AUTH.SUBMIT' | translate }}</span>
      </button>
    </form>
  </div>
</div>
