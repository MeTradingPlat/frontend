<nav class="navbar-header">
    <!-- Mobile brand banner (hidden on desktop) -->
    <div class="mobile-brand">
        <img src="logo-tipografico.png" alt="MeTradingPlat" class="mobile-brand-img" />
    </div>

    <!-- Header content -->
    <div class="header-content">
        <div class="backButton-spacer">
            @if (backPath() != '') {
                <button
                    [routerLink]="backPath()"
                    mat-button
                    class="nav-back-item"
                    [attr.aria-label]="'Volver' ">
                    <i class="bi bi-arrow-left-square-fill"></i>
                </button>
            }
        </div>
        <img src="logo-tipografico.png" alt="MeTradingPlat" class="logo-tipografico" />
        <h3>{{title()}}</h3>
        <div class="flex-spacer"></div>
        @for (item of buttons(); track item.id) {
            <button
                [routerLink]="item.routerLink && item.routerLink"
                mat-button
                class="nav-item"
                (click)="item.action && action.emit(item.action)"
                [attr.aria-label]="item.label">
                <i [class]="item.icon" aria-hidden="true"></i>
                <span i18n>{{item.label}}</span>
            </button>
        }
    </div>
</nav>
